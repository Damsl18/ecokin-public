<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte interactive — EcoKin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main>
  <section class="section" style="padding-top:2rem;">
    <div class="container">
      <span class="eyebrow">Cartographie</span>
      <h1>Carte de Kinshasa</h1>
      <p style="max-width:60ch;">Signalements validés, points de collecte et zones à risque, mis à jour en continu par les citoyens et l'équipe EcoKin.</p>

      <div class="d-flex flex-wrap gap-2 mb-3">
        <select id="communeFilter" class="form-select" style="max-width:220px;">
          <option value="">Toutes les communes</option>
        </select>
        <select id="typeDechetFilter" class="form-select" style="max-width:220px;">
          <option value="">Tous types de déchets</option>
        </select>
      </div>

      <div class="map-wrap">
        <div id="map"></div>
      </div>
      <div class="map-legend">
        <span><span class="dot" style="background:#4CAF50;"></span> Signalement traité</span>
        <span><span class="dot" style="background:#2D6CDF;"></span> Signalement en cours / validé</span>
        <span><span class="dot" style="background:#2E7D32;"></span> Point de collecte</span>
        <span><span class="dot" style="background:#C0392B;"></span> Zone à risque</span>
      </div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/include.js"></script>
<script src="js/carte.js"></script>
</body>
</html>
